on:
  push:
    branches:
      - main
env:
  HUBSPOT_ACCOUNT_ID: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
  HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: HubSpot Deploy
        uses: HubSpot/hubspot-cms-deploy-action@v2.1.0
        with:
          src_dir: fede-test
          dest_dir: fede-test